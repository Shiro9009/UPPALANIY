<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="JS/main.js" defer></script>
    <script src="JS/render.js" defer></script>
    <script src="JS/search.js" defer></script>
    <script src="JS/userName.js" defer></script>
    <title>KNOWLY</title>
</head>

<body>
    <img src="IMAGES/baclk_two 1.jpg" alt="задний фон" class="background">
    <header>
        <div class="container">
            <div class="header-inner">
                <a href="index.html" class="link-title-site">
                    <h1 class="title-site">KNOWLY</h1>
                </a>
                <div class="search-login-reg">
                    <input id="search" type="text" class="search-header">
                    <div id="userName" class="userName">
                        <button class="log-in">
                            <a class="log-in-link" href="log-in.html">вход</a>
                        </button>
                        <button class="reg">
                            <a href="registrate.html" class="reg-link">регистрация</a>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>
    <main class="main">
        <div class="container">
            <h2 onclick="allCourse()" class="catalog-cource-title">Онлайн курсы</h2>
            <ul class="catalog-cource-list">
                <li class="catalog-courde-item">
                    <a onclick="trande(courseArray)" class="catalog-cource-list-link" style="cursor: default;">В тренде</a>
                </li>
                <li class="catalog-courde-item">
                    <a onclick="newCourse(courseArray)" class="catalog-cource-list-link" style="cursor: default;">Новые курсы</a>
                </li>
                <li class="catalog-courde-item">
                    <a onclick="frontend(courseArray)" class="catalog-cource-list-link" style="cursor: default;">Frontend разработка</a>
                </li>
                <li class="catalog-courde-item">
                    <a onclick="backend(courseArray)" class="catalog-cource-list-link" style="cursor: default;">Backend разработка</a>
                </li>
                <li class="catalog-courde-item">
                    <a onclick="dataBase(courseArray)" class="catalog-cource-list-link" style="cursor: default;">Базы данных</a>
                </li>
            </ul>
            <div id="catalog-list" class="catalog-list"></div>
        </div>
    </main>
    <footer class="footer">
        <div class="container">
            <p class="footer-text">&copy; 2026 KNOWLY. Все права защищены.</p>
        </div>
    </footer>
</body>

</html>
